<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Satset Finance Core</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    :root { --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); --card-bg: rgba(255, 255, 255, 0.9); --text-main: #050a30; --text-sub: #4a5568; --accent: #0f2fd8; --border: #e2e8f0; --input-bg: #ffffff; --shadow: 0 20px 50px rgba(5, 10, 48, 0.05); --balance-bg: #f8fafc; --balance-border: #e2e8f0; }
    body.dark-mode { --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); --card-bg: rgba(30, 41, 59, 0.85); --text-main: #f1f5f9; --text-sub: #94a3b8; --accent: #38bdf8; --border: #334155; --input-bg: #0f172a; --shadow: 0 20px 50px rgba(0,0,0,0.4); --balance-bg: #1e293b; --balance-border: #334155; }
    * { box-sizing: border-box; transition: all 0.25s ease; }
    
    body { margin: 0; padding: 0; background: var(--bg-gradient); background-attachment: fixed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; }
    
    .app-workspace { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 28px; padding: 40px; width: 95vw; max-width: 1300px; height: 92vh; box-shadow: var(--shadow); display: grid; grid-template-columns: 1fr 1.6fr; gap: 40px; }
    
    .panel-brand { display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid var(--border); padding-right: 40px; height: 100%; overflow: hidden; }
    .brand-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .brand-title h1 { font-size: 26px; margin: 0; font-weight: 800; display: flex; align-items: center; gap: 14px; }
    
    /* --- OPTIMASI LOGO (PENTING) --- */
    .logo-container { 
      width: 44px; min-width: 44px; /* Gunakan min-width agar tidak gepeng di mobile */
      height: 44px; min-height: 44px; /* Gunakan min-height agar tidak gepeng di mobile */
      flex-shrink: 0; 
      border-radius: 12px; 
      display: flex; justify-content: center; align-items: center; 
      overflow: hidden; 
      box-shadow: 0 4px 14px rgba(32, 34, 242, 0.25); /* Bayangan sekarang rata dan proporsional */
      background: #2022F2; /* Mengisi latar dengan biru murni agar logo terlihat utuh */
    }
    .satset-logo { 
      width: 100%; height: 100%; 
      display: block; 
      transform: scale(0.85); /* Memperkecil vektor 15% ke tengah agar aman dari sudut lengkung kotak squircle */
    }
    
    .theme-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--border); color: var(--text-main); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-size: 16px; flex-shrink: 0; }
    .theme-btn:hover { transform: scale(1.05); }
    
    .balance-wrapper { margin-top: auto; margin-bottom: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 12px; }
    .balance-box { background: var(--balance-bg); border: 2px solid var(--balance-border); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; gap: 10px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.01); position: relative; overflow: hidden; }
    .balance-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--sub); display: flex; align-items: center; gap: 6px; }
    .balance-port-name { color: var(--accent); }
    .balance-amount { font-size: 32px; font-weight: 900; color: var(--text-main); letter-spacing: -1px; word-break: break-all; }
    .critical-alert { background: #fee2e2; color: #b91c1c; font-size: 12px; font-weight: 700; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 6px; margin-top: 5px; animation: pulse 2s infinite; display: none; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    
    .btn-action-group { display: flex; flex-direction: column; gap: 10px; margin-top: 5px; }
    .export-btn, .import-trigger-btn { background: transparent; border: 2px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
    .export-btn:hover, .import-trigger-btn:hover { background: var(--border); }
    
    .export-controls { display: none; flex-direction: column; gap: 12px; padding: 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; }
    .export-controls label { margin: 0; font-size: 10.5px; }
    .export-controls select { padding: 10px; font-size: 13px; font-weight: 600; border-radius: 10px; }
    .export-actions { display: flex; gap: 10px; }
    .export-actions button { flex: 1; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
    .btn-unduh { background: var(--accent); color: white; }
    .btn-batal { background: transparent; border: 1px solid var(--border) !important; color: var(--text-main); }
    .brand-footer { font-size: 12px; color: var(--sub); opacity: 0.7; font-weight: 500; margin-top: 20px; }
    
    /* Panel Utama Form Kanan & Scrollbar Transparan */
    .panel-form { display: flex; flex-direction: column; justify-content: flex-start; height: 100%; overflow-y: auto; padding-right: 5px; -ms-overflow-style: none; scrollbar-width: none; }
    .panel-form::-webkit-scrollbar { display: none; }
    
    .grid-form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .form-group { display: flex; flex-direction: column; }
    .full-width { grid-column: span 2; }
    label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; color: var(--sub); }
    input, select, textarea { background: var(--input-bg); border: 2px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text-main); font-size: 14.5px; width: 100%; font-weight: 500; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(15, 47, 216, 0.05); }
    .custom-input { margin-top: 8px; border-style: dashed; background: transparent; }
    .rupiah-wrapper { position: relative; display: flex; align-items: center; }
    .rupiah-wrapper span { position: absolute; left: 16px; font-weight: 700; color: var(--sub); font-size: 14.5px; }
    .rupiah-wrapper input { padding-left: 50px; }
    .submit-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px; letter-spacing: 0.5px; box-shadow: 0 8px 20px rgba(15, 47, 216, 0.15); flex-shrink: 0; }
    .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 25px rgba(15, 47, 216, 0.25); }
    .submit-btn:disabled { background: #6c757d; cursor: not-allowed; transform: none; box-shadow: none; }
    #status-msg { margin-top: 15px; text-align: center; font-weight: 600; padding: 14px; border-radius: 12px; display: none; font-size: 14px; line-height: 1.5; border: 1px solid transparent; flex-shrink: 0; }
    
    /* Wizard Importer UI Component */
    .mapping-wizard { display: none; flex-direction: column; gap: 15px; background: var(--balance-bg); border: 2px dashed var(--accent); padding: 25px; border-radius: 20px; }
    .mapping-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: center; margin-bottom: 5px; }
    .mapping-row span { font-size: 13px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }
    
    /* --- OPTIMASI RESPONSIF LAYAR SENTUH (MOBILE & TABLET) --- */
    @media (max-width: 1024px) { 
      body { height: auto; overflow: auto; padding: 0; }
      .app-workspace { grid-template-columns: 1fr; gap: 20px; padding: 25px; width: 100%; max-width: 100%; min-height: 100vh; border-radius: 0; border: none; height: auto; } 
      .panel-form { overflow-y: visible; padding-right: 0; }
      .panel-brand { border-right: none; border-bottom: 1px solid var(--border); padding-right: 0; padding-bottom: 20px; height: auto; } 
      .balance-wrapper { margin: 10px 0; padding: 10px 0; }
      .brand-footer { display: none; } 
    }
    @media (max-width: 768px) { 
      .grid-form { grid-template-columns: 1fr; gap: 12px; } 
      .full-width { grid-column: span 1; } 
      .brand-title h1 { font-size: 21px; gap: 10px; } 
      
      /* Cangkang logo dikecilkan di mobile agar pas memeluk SVG tanpa kepotong */
      .logo-container { width: 36px; height: 36px; min-width: 36px; min-height: 36px; border-radius: 10px; } 
      .satset-logo { width: 100%; height: 100%; }
      
      .theme-btn { width: 40px; height: 40px; font-size: 15px; }
      .balance-amount { font-size: 26px; } 
    }
    @media (max-width: 480px) {
      /* Bantalan ekstra 50px di bawah agar tombol aman dari Navigasi Bar bawaan HP */
      .app-workspace { padding: 25px 20px 50px 20px; } 
      .brand-title { margin-bottom: 15px; }
    }
  </style>
</head>

      <div class="balance-wrapper">
        <div class="balance-box">
          <span class="balance-label"><i class="fa-solid fa-scale-balanced"></i> <span id="balance-title">Pilih Portofolio</span></span>

            <button type="button" id="importTriggerBtn" class="import-trigger-btn" style="opacity: 0.4; cursor: not-allowed;" onclick="triggerCsvSelector()"><i class="fa-solid fa-file-import"></i> Import Laporan (.CSV)</button>

          <div id="export-controls" class="export-controls">

            <select id="export-period"></select>

              <button type="button" class="btn-unduh" onclick="executeDownload()"><i class="fa-solid fa-download"></i> Unduh</button>

    <div class="panel-form" id="rightPanel">
      <form id="trackerForm" onsubmit="handleForm(event)">
        <div class="grid-form">
          <div class="form-group">

            <input type="text" id="tgl" required>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-wallet"></i> Portofolio Keuangan</label>
            <select id="portSelect" onchange="updateKat()" required></select>
            <input type="text" id="portNew" class="custom-input" style="display:none" placeholder="Ketik Portofolio Baru...">

            <label><i class="fa-solid fa-boxes-stacked"></i> Kategori Jurnal</label>

              <option value="" disabled selected>Pilih Portofolio Dahulu...</option>
            </select>

            <label><i class="fa-solid fa-receipt"></i> Informasi Pengeluaran</label>
            <input type="text" id="inf" placeholder="Contoh: Pembayaran Lisensi Server" required>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-arrow-down" style="color:#10b981"></i> Uang Masuk (Rp)</label>
            <div class="rupiah-wrapper">
              <span>Rp</span>
              <input type="text" id="msk" value="" placeholder="0" oninput="formatRupiah(this)">
            </div>
          </div>
          <div class="form-group">
            <label><i class="fa-solid fa-arrow-up" style="color:#ef4444"></i> Uang Keluar (Rp)</label>
            <div class="rupiah-wrapper">
              <span>Rp</span>
              <input type="text" id="klr" value="" placeholder="0" oninput="formatRupiah(this)">
            </div>
          </div>
          <div class="form-group full-width">
            <label><i class="fa-solid fa-camera"></i> Bukti / Nota</label>
            <input type="file" id="fil" accept="image/*,application/pdf">

            <label><i class="fa-solid fa-comment-dots"></i> Keterangan Opsional</label>
            <textarea id="ket" rows="2" placeholder="Catatan tambahan..."></textarea>

      <div id="mappingWizard" class="mapping-wizard">
        <h3 style="margin-top:0; font-size:16px; display:flex; align-items:center; gap:8px;"><i class="fa-solid fa-wand-magic-sparkles" style="color:var(--accent)"></i> CSV Smart Importer Wizard</h3>
        <p style="font-size:13px; color:var(--text-sub); margin-bottom:20px;">Cocokkan struktur kolom file Anda dengan sistem database Satset Finance.</p>
        
        <div id="mappingRowsContainer"></div>
        
        <button type="button" class="submit-btn" style="background:#10b981;" onclick="processMappedCsv()"><i class="fa-solid fa-cloud-arrow-up"></i> PROSES & KIRIM DATA MASSAL</button>
        <button type="button" class="submit-btn" style="background:transparent; border:1px solid var(--border); color:var(--text-main); margin-top:10px; box-shadow:none;" onclick="cancelImportWizard()">BATALKAN IMPORT</button>
      </div>
    </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxVzf3CxpwD-ORNw31xAIBA7jUqKq1HPRKbXreoWtBBxE8aNJQMG9dK7yUaeF81yawjKw/exec"; 
    let mapping = {}; let balancesData = {};
    let currentExportData = []; let currentExportPort = "";
    
    // Variabel Penampung State Importer
    let csvRawHeaders = []; let csvRawRows = [];
    const targetFields = [
      { id: "tanggal", label: "Tanggal Transaksi" },
      { id: "info", label: "Informasi/Keterangan" },
      { id: "kategori", label: "Kategori Jurnal" },
      { id: "uangMasuk", label: "Uang Masuk (Rp)" },
      { id: "uangKeluar", label: "Uang Keluar (Rp)" },
      { id: "metode", label: "Jenis Pengeluaran" },
      { id: "keterangan", label: "Catatan Opsional" }
    ];

    // Kamus Kecerdasan Buatan Lokal untuk Auto-Mapping (Fuzzy matching)
    const fuzzyDictionary = {
      tanggal: ["tanggal", "tgl", "date", "waktu", "hari", "timestamp"],
      info: ["informasi", "info", "keterangan", "deskripsi", "uraian", "description", "note", "payee", "detail"],
      kategori: ["kategori", "category", "jenis", "type", "tag"],
      uangMasuk: ["masuk", "uang masuk", "debit", "pemasukan", "in", "income", "receive", "deposit"],
      uangKeluar: ["keluar", "uang keluar", "kredit", "pengeluaran", "out", "expense", "spending", "charge"],
      metode: ["metode", "method", "payment", "jenis pengeluaran", "via"],
      keterangan: ["catatan", "memo", "notes", "keterangan tambahan"]
    };

    window.onload = () => {
      flatpickr("#tgl", { altInput: true, altFormat: "d/m/Y", dateFormat: "Y-m-d", defaultDate: "today", disableMobile: "true" });
      
      fetch(API_URL + "?action=getInitialData").then(response => response.json()).then(data => {
        mapping = data.mapping; balancesData = data.balances;
        const ps = document.getElementById('portSelect');
        ps.innerHTML = '<option value="" disabled selected>Pilih Portofolio...</option>';
        Object.keys(mapping).forEach(p => ps.innerHTML += `<option value="${p}">${p}</option>`);
        ps.innerHTML += '<option value="NEW" style="color:var(--accent); font-weight:bold;">➕ Tambah Baru...</option>';
      }).catch(error => console.error('Error fetching data:', error));
    };

    function toggleMode() {
      const b = document.getElementById('main-body'); const i = document.getElementById('mode-icon');
      b.classList.toggle('dark-mode'); i.className = b.classList.contains('dark-mode') ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }

    function updateKat() {
      const ps = document.getElementById('portSelect'); const ks = document.getElementById('katSelect');
      const pn = document.getElementById('portNew'); const kn = document.getElementById('katNew');
      const title = document.getElementById('balance-title'); const balBox = document.getElementById('main-balance');
      const alertBox = document.getElementById('balance-alert'); const expBtn = document.getElementById('exportBtn');
      
      // UX Baru: Nyalakan Tombol Import & Sembunyikan Teks Petunjuk secara realtime
      const impBtn = document.getElementById('importTriggerBtn');
      const impHint = document.getElementById('import-hint');
      if(impBtn && impHint) {
        impBtn.style.opacity = "1";
        impBtn.style.cursor = "pointer";
        impHint.style.display = "none";
      }

      ks.innerHTML = '<option value="" disabled selected>Pilih Kategori...</option>'; ks.disabled = false;
      pn.style.display = ps.value === "NEW" ? "block" : "none";
      cancelDownload();
      
      if(ps.value === "NEW") {
        ks.innerHTML += '<option value="NEW" selected>➕ Tambah Baru...</option>'; ks.disabled = true; kn.style.display = "block";
        title.innerText = "Portofolio Baru"; balBox.innerText = "Rp 0"; alertBox.style.display = "none"; expBtn.style.display = "none";
      } else {
        const cats = mapping[ps.value] || [];
        cats.forEach(c => ks.innerHTML += `<option value="${c}">${c}</option>`);
        ks.innerHTML += '<option value="NEW" style="color:var(--accent); font-weight:bold;">➕ Tambah Baru...</option>'; kn.style.display = "none";
        title.innerHTML = `Kas: <span class="balance-port-name">${ps.value}</span>`;
        const balAmount = balancesData[ps.value] || 0; balBox.innerText = "Rp " + balAmount.toLocaleString('id-ID');
        if(balAmount <= 400000 && balAmount > 0) { alertBox.style.display = "flex"; } else { alertBox.style.display = "none"; }
        expBtn.style.display = "flex";
      }
    }

    function checkKatNew() { document.getElementById('katNew').style.display = document.getElementById('katSelect').value === "NEW" ? "block" : "none"; }

    function formatRupiah(inputElement) {
      let cleanValue = inputElement.value.replace(/\D/g, ''); if (cleanValue === '') { inputElement.value = ''; return; }
      inputElement.value = parseInt(cleanValue, 10).toLocaleString('id-ID');
    }

    // Ekspor Data Laporan ke CSV
    function prepareDownload() {
      const portName = document.getElementById('portSelect').value;
      const expBtn = document.getElementById('exportBtn');
      expBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyiapkan Data...';
      expBtn.disabled = true;

      fetch(API_URL + "?action=downloadReport&portofolio=" + encodeURIComponent(portName))
        .then(res => res.json())
        .then(response => {
          if(response.error) { alert(response.error); cancelDownload(); return; }
          currentExportData = response.data; currentExportPort = portName;
          const periods = new Set();
          for(let i = 1; i < currentExportData.length; i++) { if(currentExportData[i][10]) periods.add(currentExportData[i][10]); }
          const sel = document.getElementById('export-period');
          sel.innerHTML = '<option value="ALL">Semua Periode Transaksi</option>';
          periods.forEach(p => { sel.innerHTML += `<option value="${p}">${p}</option>`; });
          expBtn.style.display = 'none'; document.getElementById('export-controls').style.display = 'flex';
        })
        .catch(err => { alert("Gagal mengunduh: " + err); cancelDownload(); });
    }

    function executeDownload() {
      const selPeriod = document.getElementById('export-period').value;
      let finalData = [];
      if(selPeriod === "ALL") {
         finalData = currentExportData;
      } else {
         finalData.push(currentExportData[0]); 
         for(let i = 1; i < currentExportData.length; i++) { if(currentExportData[i][10] === selPeriod) finalData.push(currentExportData[i]); }
      }
      let csvContent = "";
      finalData.forEach(row => { let csvRow = row.map(item => `"${String(item).replace(/"/g, '""')}"`).join(","); csvContent += csvRow + "\r\n"; });
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      let filename = `Laporan_Satset_${currentExportPort.replace(/\s+/g, '_')}`;
      if(selPeriod !== "ALL") filename += `_${selPeriod.replace(/\s+/g, '_')}`;
      link.setAttribute("download", filename + `.csv`);
      link.style.visibility = 'hidden'; document.body.appendChild(link); link.click(); document.body.removeChild(link);
      cancelDownload(); 
    }

    function cancelDownload() {
      document.getElementById('export-controls').style.display = 'none';
      const expBtn = document.getElementById('exportBtn');
      expBtn.innerHTML = '<i class="fa-solid fa-file-csv"></i> Download Laporan';
      expBtn.style.display = 'flex'; expBtn.disabled = false;
    }

    // ==================================================
    // LOGIKA PUSAT SMART IMPORTER WIZARD (CSV)
    // ==================================================
    function triggerCsvSelector() {
      const ps = document.getElementById('portSelect').value;
      const pn = document.getElementById('portNew').value;
      const targetPort = ps === "NEW" ? pn : ps;

      if(!targetPort || targetPort.trim() === "") { 
        alert("Silakan pilih atau ketik nama Portofolio target terlebih dahulu sebelum melakukan import!"); 
        return; 
      }
      document.getElementById('csvFileInput').click();
    }

    function handleCsvUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      Papa.parse(file, {
        skipEmptyLines: true,
        complete: function(results) {
          if(results.data.length < 2) { alert("File CSV kekurangan baris data transaksi."); return; }
          csvRawHeaders = results.data[0];
          csvRawRows = results.data.slice(1);
          buildMappingUiWizard();
        }
      });
    }

    function buildMappingUiWizard() {
      document.getElementById('trackerForm').style.display = 'none';
      const container = document.getElementById('mappingRowsContainer');
      container.innerHTML = "";
      
      targetFields.forEach(field => {
        let optionsHtml = `<option value="">-- Abaikan Kolom Ini --</option>`;
        let detectedIndex = -1;

        csvRawHeaders.forEach((header, idx) => {
          const cleanHeader = header.toLowerCase().trim();
          const matchWords = fuzzyDictionary[field.id];
          
          matchWords.forEach(word => {
            if(cleanHeader.includes(word) && detectedIndex === -1) { detectedIndex = idx; }
          });
          optionsHtml += `<option value="${idx}">${header}</option>`;
        });

        const rowHtml = `
          <div class="mapping-row">
            <span>${field.label}</span>
            <select data-field-id="${field.id}" class="wizard-selector">
              ${optionsHtml}
            </select>
          </div>
        `;
        container.innerHTML += rowHtml;

        const selectors = container.querySelectorAll('.wizard-selector');
        const lastSelector = selectors[selectors.length - 1];
        if(detectedIndex !== -1) { lastSelector.value = detectedIndex; }
      });

      document.getElementById('mappingWizard').style.display = 'flex';
    }

    function processMappedCsv() {
      const selectors = document.querySelectorAll('.wizard-selector');
      const maps = {};
      selectors.forEach(sel => { maps[sel.getAttribute('data-field-id')] = sel.value; });

      if(!maps['tanggal'] || !maps['info'] || !maps['kategori']) {
        alert("Gagal: Kolom Tanggal Transaksi, Informasi, dan Kategori Jurnal hukumnya wajib dipetakan!"); return;
      }

      const ps = document.getElementById('portSelect').value;
      const portName = ps === "NEW" ? document.getElementById('portNew').value : ps;
      const statusMsg = document.getElementById('status-msg');
      
      cancelImportWizard(); 
      
      document.getElementById('btn').disabled = true;
      statusMsg.style.display = "block";
      statusMsg.style.background = "var(--border)";
      statusMsg.style.color = "var(--text-main)";
      statusMsg.innerText = `⚡ Sedang Memproses & Mengunggah ${csvRawRows.length} Transaksi Secara Massal...`;

      let completedCount = 0;
      let errorOccurred = false;

      csvRawRows.forEach(row => {
        let rawMsk = maps['uangMasuk'] !== "" ? row[maps['uangMasuk']] : "0";
        let rawKlr = maps['uangKeluar'] !== "" ? row[maps['uangKeluar']] : "0";
        let cleanMsk = String(rawMsk).replace(/[^0-9]/g, '');
        let cleanKlr = String(rawKlr).replace(/[^0-9]/g, '');

        const payload = {
          tanggal: row[maps['tanggal']],
          portofolio: portName,
          kategori: maps['kategori'] !== "" ? row[maps['kategori']] : "Umum",
          info: row[maps['info']],
          uangMasuk: parseFloat(cleanMsk) || 0,
          uangKeluar: parseFloat(cleanKlr) || 0,
          metode: maps['metode'] !== "" ? row[maps['metode']] : "Non Tunai",
          keterangan: maps['keterangan'] !== "" ? row[maps['keterangan']] : "Imported massal via CSV Wizard",
          fileData: null, fileName: null
        };

        fetch(API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) })
          .then(res => res.json())
          .then(result => {
            if(result.status === 'success') {
              completedCount++;
              if(completedCount === csvRawRows.length && !errorOccurred) {
                statusMsg.style.background = "#dcfce7"; statusMsg.style.color = "#166534";
                statusMsg.innerHTML = `<span><i class="fa-solid fa-circle-check"></i> Sukses! Berhasil mengimpor <b>${completedCount}</b> entri data keuangan massal.</span>`;
                document.getElementById('main-balance').innerText = result.message.saldoString;
                
                fetch(API_URL + "?action=getInitialData").then(res => res.json()).then(d => { 
                  mapping = d.mapping; balancesData = d.balances; 
                  document.getElementById('trackerForm').reset(); 
                  document.getElementById('tgl')._flatpickr.setDate(new Date());
                  document.getElementById('portNew').style.display = "none"; 
                  document.getElementById('katNew').style.display = "none"; 
                  document.getElementById('katSelect').disabled = true;
                  
                  const psElem = document.getElementById('portSelect');
                  psElem.innerHTML = '<option value="" disabled selected>Pilih Portofolio...</option>';
                  Object.keys(mapping).forEach(p => psElem.innerHTML += `<option value="${p}">${p}</option>`);
                  psElem.innerHTML += '<option value="NEW" style="color:var(--accent); font-weight:bold;">➕ Tambah Baru...</option>';
                  
                  // Reset kembali tombol import ke mode awal setelah refresh data
                  document.getElementById('importTriggerBtn').style.opacity = "0.4";
                  document.getElementById('importTriggerBtn').style.cursor = "not-allowed";
                  document.getElementById('import-hint').style.display = "block";
                });
              }
            } else { throw new Error(); }
          })
          .catch(() => {
            errorOccurred = true;
            statusMsg.style.background = "#fee2e2"; statusMsg.style.color = "#991b1b";
            statusMsg.innerText = "Proses import massal terhenti karena terjadi gangguan API Server.";
          })
          .finally(() => { if(completedCount === csvRawRows.length) document.getElementById('btn').disabled = false; });
      });
    }

    function cancelImportWizard() {
      document.getElementById('mappingWizard').style.display = 'none';
      document.getElementById('trackerForm').style.display = 'block';
      document.getElementById('csvFileInput').value = "";
    }

    // Kompresi Gambar Nota Sisi Klien
    function compressImage(file, callback) {
      const reader = new FileReader(); reader.readAsDataURL(file);
      reader.onload = function(event) {
        const img = new Image(); img.src = event.target.result;
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 1024; const MAX_HEIGHT = 1024;
          let width = img.width; let height = img.height;
          if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
          else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
          callback(dataUrl);
        }
      }
    }

    function handleForm(e) {
      e.preventDefault(); const b = document.getElementById('btn'); const s = document.getElementById('status-msg');
      const rawMsk = document.getElementById('msk').value.replace(/\./g, ''); const rawKlr = document.getElementById('klr').value.replace(/\./g, '');
      const mVal = parseFloat(rawMsk) || 0; const kVal = parseFloat(rawKlr) || 0;
      if (mVal === 0 && kVal === 0) {
        s.style.display = "block"; s.style.background = "#fee2e2"; s.style.color = "#991b1b"; s.innerText = "Error: Nominal Uang Masuk atau Keluar harus diisi!"; return;
      }
      b.disabled = true; s.style.display = "block"; s.style.background = "var(--border)"; s.style.color = "var(--text-main)"; s.style.borderColor = "transparent"; 
      s.innerText = "⚡ Sedang Mengompresi & Menyinkronkan Data...";
      const f = document.getElementById('fil').files[0];
      if (f) {
        if (f.type.startsWith('image/')) { compressImage(f, function(compressedData) { sendDataViaAPI(compressedData, f.name, mVal, kVal); }); } 
        else { const r = new FileReader(); r.onload = ev => sendDataViaAPI(ev.target.result, f.name, mVal, kVal); r.readAsDataURL(f); }
      } else { sendDataViaAPI(null, null, mVal, kVal); }
    }

    function sendDataViaAPI(fd, fn, mVal, kVal) {
      const ps = document.getElementById('portSelect').value; const ks = document.getElementById('katSelect').value;
      const payload = {
        tanggal: document.getElementById('tgl').value, portofolio: ps === "NEW" ? document.getElementById('portNew').value : ps,
        kategori: (ks === "Upload Baru" || ps === "NEW") ? document.getElementById('katNew').value : ks,
        info: document.getElementById('inf').value, uangMasuk: mVal, uangKeluar: kVal,
        metode: document.getElementById('mtd').value, keterangan: document.getElementById('ket').value, fileData: fd, fileName: fn
      };
      fetch(API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) })
      .then(response => response.json())
      .then(result => {
        if (result.status === 'success') {
          const s = document.getElementById('status-msg'); s.style.background = "#dcfce7"; s.style.color = "#166534"; s.style.borderColor = "#bbf7d0";
          s.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; gap:4px;"><span style="letter-spacing: 0.5px;"><i class="fa-solid fa-circle-check" style="margin-right: 5px;"></i> Entri Jurnal Berhasil Dibukukan</span><span style="font-size:13.5px; font-weight:500; opacity:0.85; margin-top: 2px;">Saldo Berjalan Terkini: <b style="font-size:15px; color: #14532d; opacity:1;">${result.message.saldoString}</b></span></div>`;
          document.getElementById('main-balance').innerText = result.message.saldoString;
          const alertBox = document.getElementById('balance-alert');
          if(result.message.saldoAngka <= 400000 && result.message.saldoAngka > 0) { alertBox.style.display = "flex"; } else { alertBox.style.display = "none"; }
          document.getElementById('trackerForm').reset(); document.getElementById('tgl')._flatpickr.setDate(new Date());
          document.getElementById('portNew').style.display = "none"; document.getElementById('katNew').style.display = "none"; document.getElementById('katSelect').disabled = true;
          
          // Kembalikan ke mode redup untuk tombol import setelah submit manual
          document.getElementById('importTriggerBtn').style.opacity = "0.4";
          document.getElementById('importTriggerBtn').style.cursor = "not-allowed";
          document.getElementById('import-hint').style.display = "block";
          
          fetch(API_URL + "?action=getInitialData").then(res => res.json()).then(d => { mapping = d.mapping; balancesData = d.balances; });
        } else { throw new Error(result.message); }
      })
      .catch(error => {
        const s = document.getElementById('status-msg'); s.style.background = "#fee2e2"; s.style.color = "#991b1b"; s.style.borderColor = "#fca5a5"; s.innerText = "Gagal Terhubung ke API: " + error.message;
      })
      .finally(() => { document.getElementById('btn').disabled = false; });
    }
  </script>
